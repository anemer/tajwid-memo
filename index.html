<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tajwid Memo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <meta
      name="description"
      content="A Tajwid memo app to help memorize the characteristics of Arabic letters in the Quran."
    />
    <meta
      name="keywords"
      content="Tajwid, Arabic letters, Quran, memorization, characteristics, صفات الحروف العربية, تجويد"
    />
    <meta name="author" content="الحسين نمر" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row">
        <div class="col-md-12">
          <h1 class="mb-4">صفات الحروف</h1>
          <div class="table-responsive">
            <table
              class="table table-striped table-hover align-middle text-center"
            >
              <thead class="">
                <tr>
                  <th>
                    <button
                      type="button"
                      class="sort-button"
                      data-sort-column="0"
                    >
                      حرف
                    </button>
                  </th>
                  <th class="only-wide">
                    <button
                      type="button"
                      class="sort-button"
                      data-sort-column="1"
                    >
                      الاسم
                    </button>
                  </th>
                  <th class="p-0 sifat-header-1">
                    <div class="sort-button sifat-header" data-sort-column="2">
                      <span class="sifat-header-text">الجهر او الهمس</span>
                    </div>
                  </th>
                  <th class="p-0 sifat-header-2">
                    <div class="sort-button sifat-header" data-sort-column="3">
                      <span class="sifat-header-text">الشدة / الرخاوة</span>
                    </div>
                  </th>
                  <th class="p-0 sifat-header-3">
                    <div class="sort-button sifat-header" data-sort-column="4">
                      <span class="sifat-header-text"
                        >الاستعلاء / الاستفال</span
                      >
                    </div>
                  </th>
                  <th class="p-0 sifat-header-4">
                    <div class="sort-button sifat-header" data-sort-column="5">
                      <span class="sifat-header-text">الإطباق / الانفتاح</span>
                    </div>
                  </th>
                  <th class="p-0 sifat-header-5">
                    <div class="sort-button sifat-header" data-sort-column="6">
                      <span class="sifat-header-text">الإذلاق / الإصمات</span>
                    </div>
                  </th>
                  <th class="p-0 sifat-header-6">
                    <div class="sort-button sifat-header" data-sort-column="7">
                      <span class="sifat-header-text">الصفة 6</span>
                    </div>
                  </th>
                  <th class="p-0 sifat-header-7">
                    <div class="sort-button sifat-header" data-sort-column="8">
                      <span class="sifat-header-text">الصفة 7</span>
                    </div>
                  </th>
                </tr>
              </thead>
              <tbody id="letters-table-body"></tbody>
            </table>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12">
            <h1 class="mb-4">الصفات</h1>

            <div id="sifat-legend-body"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const collator = new Intl.Collator("ar", { sensitivity: "base" });
      const sortState = {
        column: null,
        direction: "asc",
      };

      function getSortValue(letter, columnIndex, sifatLookup) {
        if (columnIndex === 0) {
          return letter.character || "";
        }

        if (columnIndex === 1) {
          return letter.arabic_name || "";
        }

        const sifatKey = letter.sifat[columnIndex - 2];
        return sifatLookup[sifatKey]?.arabic_name || "";
      }

      function sortLetters(letters, sifatLookup) {
        if (sortState.column === null) {
          return letters;
        }

        return [...letters].sort((left, right) => {
          const leftValue = getSortValue(left, sortState.column, sifatLookup);
          const rightValue = getSortValue(right, sortState.column, sifatLookup);
          const comparison = collator.compare(leftValue, rightValue);

          return sortState.direction === "asc" ? comparison : -comparison;
        });
      }

      function updateSortButtons() {
        document.querySelectorAll(".sort-button").forEach((button) => {
          const buttonColumn = Number(button.dataset.sortColumn);
          const isActive = buttonColumn === sortState.column;
          const indicator = isActive
            ? sortState.direction === "asc"
              ? " ▲"
              : " ▼"
            : "";

          button.classList.toggle("active", isActive);
          button.setAttribute(
            "aria-sort",
            isActive ? sortState.direction : "none",
          );
          button.textContent = button.dataset.label + indicator;
        });
      }

      function attachSorting(renderTable) {
        document.querySelectorAll(".sort-button").forEach((button) => {
          button.dataset.label = button.textContent.trim();
          button.addEventListener("click", () => {
            const clickedColumn = Number(button.dataset.sortColumn);

            if (sortState.column === clickedColumn) {
              sortState.direction =
                sortState.direction === "asc" ? "desc" : "asc";
            } else {
              sortState.column = clickedColumn;
              sortState.direction = "asc";
            }

            renderTable();
          });
        });

        updateSortButtons();
      }

      function toArabicAcronym(text) {
        const normalizedText = (text || "")
          .replace(/[\u064B-\u065F\u0670]/g, "")
          .trim();

        if (!normalizedText) {
          return "";
        }

        const tokens = normalizedText
          .split(/\s+|\//)
          .map((token) => token.replace(/^ال/, "").trim())
          .filter(Boolean);

        if (tokens.length > 1) {
          return tokens
            .slice(0, 6)
            .map((token) => token[0])
            .join("");
        }

        return tokens[0].slice(0, 6);
      }

      function toRow(content) {
        return `<tr><td class="legend-start">${content[0]}</td><td class="legend-end">${content[1]}</td></tr>`;
      }

      async function renderSifatLegend() {
        const sifatTableBody = document.getElementById("sifat-legend-body");
        try {
          const response = await fetch("data.json");
          const data = await response.json();
          const sifatEntries = Object.entries(data.sifat || {});
          sifatTableBody.innerHTML = sifatEntries
            .map(([key, sifat]) => {
              console.log("Rendering sifat:", key, sifat);
              const arabicName = sifat.arabic_name || "";
              const oppositeSifat = sifat.opposite
                ? data.sifat[sifat.opposite]
                : null;
              const oppositeName = oppositeSifat
                ? oppositeSifat.arabic_name
                : "";
              const oppositeClass = oppositeSifat
                ? oppositeSifat.css_class
                : "";
              const title = `<h2>صفة ${arabicName}</h2>`;
              const cells = [];
              cells.push([
                "في  جدول الحروف",
                `<span class="${sifat.css_class} sifat-legend">${arabicName}</span>`,
              ]);

              if (sifat.opposite) {
                cells.push([
                  "عكسه",
                  `<span class="opposite-sifat">${oppositeName}</span>`,
                ]);
              }
              cells.push([
                "شرح الصفة",
                `<p>${sifat.description || ""}</p>`,
              ]);

              letters = sifat.letters_memo
                ? `<p>احرف عبارة:</p>
                    <span class="amiri-quran-regular">${sifat.letters_memo}</span>`
                : `<p class="">${sifat.letters || ""}</p>`;

              cells.push([`<h3 class="">حروفه</h3>`, letters]);

              const tableBegin = `<table class=" sifat-legend-table">
                          <thead> 
                          </thead>
                          <tbody>`;
              const tableEnd = `</tbody></table>`;

              return [
                '<div class="sifat-entry">',
                title,
                tableBegin,
                cells.map(toRow).join(""),
                tableEnd,
                "</div>",
              ].join("\n");
            })
            .join("");
        } catch (error) {
          sifatTableBody.innerHTML = `
                          <div class="text-danger">Failed to load sifat legend from data.json</div>
                      `;
          console.error(error);
        }
      }

      async function renderLettersTable() {
        const tableBody = document.getElementById("letters-table-body");

        try {
          const response = await fetch("data.json");
          const data = await response.json();
          const letters = Object.values(data.letters || {});
          const sifatLookup = data.sifat || {};

          const renderTable = () => {
            const sortedLetters = sortLetters(letters, sifatLookup);

            tableBody.innerHTML = sortedLetters
              .map((letter) => {
                const sifatCells = Array.from({ length: 7 }, (_, index) => {
                  const sifatKey = letter.sifat[index];
                  const sifatMeta = sifatKey ? sifatLookup[sifatKey] : null;
                  const sifatName = sifatMeta?.arabic_name || sifatKey || "";
                  const sifatClass = sifatMeta?.css_class || "";
                  const sifatAcronym = toArabicAcronym(sifatName);

                  return `<td class="p-0 sifat-cell"><span class="sifat-name ${sifatClass}" title="${sifatName}" aria-label="${sifatName}"><span class="sifat-full">${sifatName}</span><span class="sifat-acronym" aria-hidden="true">${sifatAcronym}</span></span></td>`;
                }).join("");

                return `
                              <tr>
                                  <td class="fs-3">${letter.character}</td>
                                  <td class="only-wide amiri-quran-regular">${letter.arabic_name}</td>
                                  ${sifatCells}
                              </tr>
                          `;
              })
              .join("");

            updateSortButtons();
          };

          attachSorting(renderTable);
          renderTable();
        } catch (error) {
          tableBody.innerHTML = `
                          <tr>
                              <td colspan="9" class="text-danger">Failed to load data.json</td>
                          </tr>
                      `;
          console.error(error);
        }
      }

      renderLettersTable();

      renderSifatLegend();
    </script>
  </body>
</html>
